        :root {
            --primary: #3B82F6;
            --primary-dark: #2563eb;
            --primary-light: #93bbfc;
            --primary-bg: rgba(59,130,246,0.1);
            --sidebar-bg: rgba(255,255,255,0.95);
            --border-color: rgba(0,0,0,0.06);
            --bg-body: #f9fafb;
            --text-body: #111827;

        body.dark {
            --sidebar-bg: rgba(18,18,30,0.95);
            --border-color: rgba(255,255,255,0.06);
            --bg-body: #030712;
            --text-body: #f9fafb;
        }
        /* Theme classes (applied to body) */
        .theme-purple { --primary: #8B5CF6; --primary-dark: #7c3aed; --primary-light: #c4b5fd; --primary-bg: rgba(139,92,246,0.1); }
        .theme-green { --primary: #22C55E; --primary-dark: #16a34a; --primary-light: #86efac; --primary-bg: rgba(34,197,94,0.1); }
        .theme-orange { --primary: #F59E0B; --primary-dark: #d97706; --primary-light: #fcd34d; --primary-bg: rgba(245,158,11,0.1); }
        .theme-pink { --primary: #EC4899; --primary-dark: #db2777; --primary-light: #f9a8d4; --primary-bg: rgba(236,72,153,0.1); }
        .theme-teal { --primary: #14B8A6; --primary-dark: #0d9488; --primary-light: #5eead4; --primary-bg: rgba(20,184,166,0.1); }

        * { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        body { transition: background-color 0.3s ease, color 0.2s ease; overflow-x: hidden; background-color: var(--bg-body); color: var(--text-body); }
        
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100vh;
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-color);
            z-index: 1000;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
            padding: 2rem 1.5rem;
        }
        .sidebar.collapsed {
            width: 80px;
            padding: 1.5rem 0.75rem;
        }
        .sidebar.collapsed .sidebar-logo span,
        .sidebar.collapsed .sidebar-nav a span,
        .sidebar.collapsed .sidebar-nav a .nav-text,
        .sidebar.collapsed .sidebar-footer .footer-text,
        .sidebar.collapsed .theme-selector label {
            display: none;
        }
        .sidebar.collapsed .sidebar-logo { justify-content: center; }
        .sidebar.collapsed .sidebar-nav a { justify-content: center; padding: 0.75rem; }
        .sidebar.collapsed .sidebar-nav a i { font-size: 1.3rem; margin: 0; }
        .sidebar.collapsed .sidebar-footer { align-items: center; }
        .sidebar.collapsed .sidebar-footer button { justify-content: center; padding: 0.75rem; }
        .sidebar.collapsed .sidebar-footer button i { font-size: 1.2rem; }
        .sidebar.collapsed .theme-selector { flex-direction: column; gap: 0.5rem; }
        .sidebar.collapsed .theme-selector .theme-dot { width: 28px; height: 28px; margin: 0 auto; }
        
        .sidebar-toggle {
            position: absolute;
            bottom: 1rem;
            right: -12px;
            width: 24px;
            height: 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 0.7rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            transition: transform 0.3s;
            z-index: 10;
        }
        .sidebar.collapsed .sidebar-toggle { transform: rotate(180deg); }
        .sidebar-toggle:hover { transform: scale(1.1); }
        .sidebar.collapsed .sidebar-toggle:hover { transform: scale(1.1) rotate(180deg); }

        .sidebar-logo {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 2.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .sidebar-logo img {
            width: 44px;
            height: 44px;
            border-radius: 50%;

            border: 2px solid var(--primary);

        .sidebar-nav { display: flex; flex-direction: column; gap: 0.25rem; }

        #bg-canvas {

            z-index: -2;

        .gradient-overlay {

            top: 0;
            left: 0;

            height: 100%;
            z-index: -1;
            pointer-events: none;
            transition: opacity 0.3s ease;

        body.light .gradient-overlay {
            background: radial-gradient(circle at 20% 50%, rgba(59,130,246,0.08), rgba(139,92,246,0.05), transparent);

        .footer {
            border-top: 1px solid var(--border-color);
            padding: 2rem 0;

            text-align: center;
        }
        .footer-name {
            font-weight: 600;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;

        /* ===== CV Edit Mode ===== */
        .cv-edit-mode .editable {
            outline: 2px dashed #3B82F6;
            outline-offset: 2px;
            cursor: text;
            transition: outline 0.2s;
        }
        .cv-edit-mode .editable:hover {
            outline-color: #2563eb;
        }
        .cv-edit-mode .editable:focus {
            outline: 2px solid #3B82F6;
        }
        .cv-section-title {
            font-weight: 700;
            font-size: 1.25rem;
            border-left: 4px solid var(--primary);
            padding-left: 0.75rem;
            margin-bottom: 0.75rem;
            margin-top: 1.5rem;
        }
        .cv-reference-item {
            display: flex;
            justify-content: space-between;
            padding: 0.3rem 0;
            border-bottom: 1px dashed #e2e8f0;
        }
        .cv-reference-item:last-child {
            border-bottom: none;
        }

        /* ===== Print Styles ===== */
        @media print {
            .no-print { display: none !important; }
            .cv-edit-mode .editable { outline: none !important; }
            .sidebar, .hamburger, .gradient-overlay, #bg-canvas, #theme-toggle, .theme-selector, .sidebar-toggle, .section-nav-btn, .footer { display: none !important; }
            .main-content { margin-left: 0 !important; padding: 0 !important; }
            #content-container { max-width: 100% !important; padding: 2rem !important; }
            .glass-card { background: white !important; border: 1px solid #ddd !important; box-shadow: none !important; }
            body { background: white !important; color: black !important; }
            .gradient-text { color: #3B82F6 !important; background: none !important; -webkit-text-fill-color: #3B82F6 !important; }
            .cv-print-section { page-break-inside: avoid; }
        }
    </style>
</head>

    <script>
        // ==================== ADMIN PASSWORD (for CV edit) ====================
        const ADMIN_PASSWORD = "getaye"; // same as in admin.html

        // ==================== SUPABASE CONFIG ====================
        const SUPABASE_URL = "https://vedehlwosfutknqhguiv.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZlZGVobHdvc2Z1dGtucWhndWl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMjQxOTUsImV4cCI6MjA5NzcwMDE5NX0.PU4cyfwNj41flxXXcLL37YgLHIjKhzkkRg4KWmHZ0H0";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ==================== EMAILJS ====================
        const EMAILJS_PUBLIC_KEY = "kIJSIlPXMV_TU9Dv6";
        const EMAILJS_SERVICE_ID = "service_cyqyljp";
        const EMAILJS_TEMPLATE_ID = "template_sbfixck";
        emailjs.init(EMAILJS_PUBLIC_KEY);

        // ==================== STATE ====================
        let currentSection = window.location.hash.replace('#', '') || 'home';
        let allData = {
            experiences: [],
            certifications: [],
            education: [],
            projects: [],
            news: [],
            services: [],
            clients: [],
            skills: []
        };

        const container = document.getElementById('content-container');
        const sidebarLinks = document.querySelectorAll('.sidebar-nav a');
        const hamburger = document.getElementById('hamburger');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const sidebarToggle = document.getElementById('sidebarToggle');

        // ==================== SIDEBAR COLLAPSE ====================
        let isSidebarCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
        if (isSidebarCollapsed && window.innerWidth > 768) {
            sidebar.classList.add('collapsed');
        }
        sidebarToggle.addEventListener('click', () => {
            if (window.innerWidth > 768) {
                sidebar.classList.toggle('collapsed');
                localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
                const footer = document.querySelector('.footer');
                if (footer) {
                    footer.style.marginLeft = sidebar.classList.contains('collapsed') ? '80px' : '280px';
                }
            }
        });
        window.addEventListener('resize', () => {
            const footer = document.querySelector('.footer');
            if (footer) {
                if (window.innerWidth <= 768) {
                    footer.style.marginLeft = '0';
                } else {
                    footer.style.marginLeft = sidebar.classList.contains('collapsed') ? '80px' : '280px';
                }
            }
        });

        // ==================== MOBILE SIDEBAR ====================
        function toggleSidebar() {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }
        function closeSidebar() {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }
        hamburger.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', closeSidebar);
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSidebar(); });

        // ==================== THEME SYSTEM (Single Toggle) ====================
        // Define all theme states: [dark (boolean), colour (string)]
        const themeStates = [
            { dark: false, colour: 'default' },
            { dark: true,  colour: 'default' },
            { dark: false, colour: 'purple' },
            { dark: true,  colour: 'purple' },
            { dark: false, colour: 'green' },
            { dark: true,  colour: 'green' },
            { dark: false, colour: 'orange' },
            { dark: true,  colour: 'orange' },
            { dark: false, colour: 'pink' },
            { dark: true,  colour: 'pink' },
            { dark: false, colour: 'teal' },
            { dark: true,  colour: 'teal' }
        ];

        // Load current theme index from localStorage, or default to 0 (light default)
        let currentThemeIndex = parseInt(localStorage.getItem('themeIndex')) || 0;
        // Ensure index is valid
        if (currentThemeIndex >= themeStates.length) currentThemeIndex = 0;

        function applyThemeState(index) {
            const state = themeStates[index];
            // Dark mode
            document.body.classList.toggle('dark', state.dark);
            // Colour theme
            document.body.classList.remove('theme-default', 'theme-purple', 'theme-green', 'theme-orange', 'theme-pink', 'theme-teal');
            if (state.colour !== 'default') {
                document.body.classList.add('theme-' + state.colour);
            }
            // Icon: sun for light, moon for dark
            const icon = document.getElementById('theme-icon');
            if (icon) {
                icon.className = state.dark ? 'fas fa-moon' : 'fas fa-sun';
            }
            // Save to localStorage
            localStorage.setItem('themeIndex', index);
            currentThemeIndex = index;
        }

        // Apply saved theme on load
        applyThemeState(currentThemeIndex);

        // Theme toggle button: cycle to next state
        document.getElementById('theme-toggle').addEventListener('click', () => {
            const nextIndex = (currentThemeIndex + 1) % themeStates.length;
            applyThemeState(nextIndex);
        });

                                    <span><i class="fas fa-map-marker-alt mr-1"></i> <span class="editable" contenteditable="false">${location}</span></span>
                                    <span><i class="fas fa-birthday-cake mr-1"></i> <span class="editable" contenteditable="false">Age: ${age} years</span></span>
                                    <span><i class="fas fa-link mr-1"></i> <span class="editable" contenteditable="false">Portfolio: ${portfolio}</span></span>
                                    <span><i class="fab fa-linkedin mr-1"></i> <a href="${linkedin}" target="_blank">LinkedIn</a></span>
                                    <span><i class="fab fa-github mr-1"></i> <a href="${github}" target="_blank">GitHub</a></span>
                                </div>
                            </div>
                        </div>

                        <!-- Summary -->
                        <div class="mb-6">
                            <h3 class="cv-section-title editable" contenteditable="false">Professional Summary</h3>
                            <p class="text-gray-700 dark:text-gray-300 leading-relaxed editable" contenteditable="false">Dedicated System and Database Officer with expertise in Oracle Database, Nutanix virtualization, Active Directory, and enterprise IT infrastructure. Currently serving at Ahadu Bank, managing mission-critical systems while pursuing MSc in Computer Science at AAU. Passionate about bridging infrastructure engineering with modern software development and AI research.</p>
                        </div>

                        <!-- Experience -->
                        ${experiences.length ? `
                        <div class="mb-6">
                            <h3 class="cv-section-title editable" contenteditable="false">Work Experience</h3>
                            ${experiences.map(exp => `
                                <div class="mb-4 pl-3 border-l-2 border-gray-200 dark:border-gray-700">
                                    <div class="flex justify-between items-start flex-wrap">
                                        <div>
                                            <h4 class="font-bold text-lg editable" contenteditable="false">${exp.title}</h4>
                                            <p class="text-blue-600 dark:text-blue-400 font-medium editable" contenteditable="false">${exp.company}</p>
                                        </div>
                                        <span class="text-sm text-gray-500 editable" contenteditable="false">${exp.period}</span>
                                    </div>
                                    <p class="text-sm text-gray-600 dark:text-gray-300 mt-1 editable" contenteditable="false">${exp.description}</p>
                                </div>
                            `).join('')}
                        </div>
                        ` : ''}

                        <!-- Education -->
                        ${education.length ? `
                        <div class="mb-6">
                            <h3 class="cv-section-title editable" contenteditable="false">Education</h3>
                            ${education.map(edu => `
                                <div class="mb-3 pl-3 border-l-2 border-gray-200 dark:border-gray-700">
                                    <div class="flex justify-between items-start flex-wrap">
                                        <div>
                                            <h4 class="font-bold editable" contenteditable="false">${edu.degree}</h4>
                                            <p class="text-gray-600 dark:text-gray-400 editable" contenteditable="false">${edu.school}</p>
                                        </div>
                                        <span class="text-sm text-gray-500 editable" contenteditable="false">${edu.year}</span>
                                    </div>
                                    ${edu.gpa ? `<p class="text-sm text-gray-500 editable" contenteditable="false">GPA: ${edu.gpa}</p>` : ''}
                                    ${edu.focus ? `<p class="text-sm text-gray-500 editable" contenteditable="false">Focus: ${edu.focus}</p>` : ''}
                                </div>
                            `).join('')}
                        </div>
                        ` : ''}

                        <!-- Certifications -->
                        ${certifications.length ? `
                        <div class="mb-6">
                            <h3 class="cv-section-title editable" contenteditable="false">Certifications</h3>
                            <div class="grid md:grid-cols-2 gap-3">
                                ${certifications.map(cert => `
                                    <div class="pl-3 border-l-2 border-gray-200 dark:border-gray-700">
                                        <p class="font-semibold editable" contenteditable="false">${cert.name}</p>
                                        <p class="text-sm text-gray-500 editable" contenteditable="false">${cert.issuer} • ${cert.year}</p>
                                        ${cert.credential_id ? `<p class="text-xs text-gray-400 editable" contenteditable="false">ID: ${cert.credential_id}</p>` : ''}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        ` : ''}

                        <!-- Projects -->
                        ${projects.length ? `
                        <div class="mb-6">
                            <h3 class="cv-section-title editable" contenteditable="false">Projects</h3>
                            ${projects.map(proj => `
                                <div class="mb-3 pl-3 border-l-2 border-gray-200 dark:border-gray-700">
                                    <div class="flex justify-between items-start flex-wrap">
                                        <h4 class="font-bold editable" contenteditable="false">${proj.name}</h4>
                                        <span class="text-sm text-gray-500 editable" contenteditable="false">${proj.year || ''}</span>
                                    </div>
                                    <p class="text-sm text-gray-600 dark:text-gray-300 editable" contenteditable="false">${proj.description}</p>
                                    ${proj.tech ? `<div class="flex flex-wrap gap-2 mt-1">${proj.tech.map(t => `<span class="px-2 py-1 bg-gray-100 dark:bg-gray-700 rounded-md text-xs">${t}</span>`).join('')}</div>` : ''}
                                </div>
                            `).join('')}
                        </div>
                        ` : ''}

                        <!-- Skills -->
                        ${skills && skills.length ? `
                        <div class="mb-6">
                            <h3 class="cv-section-title editable" contenteditable="false">Core Competencies</h3>
                            <div class="flex flex-wrap gap-2">
                                ${skills.map(s => `<span class="px-3 py-1 bg-gray-100 dark:bg-gray-700 rounded-full text-sm editable" contenteditable="false">${s.name}</span>`).join('')}
                            </div>
                        </div>
                        ` : ''}

                        <!-- References -->
                        <div>
                            <h3 class="cv-section-title editable" contenteditable="false">References</h3>
                            ${references.map(ref => `
                                <div class="cv-reference-item editable" contenteditable="false">
                                    <span><strong>${ref.name}</strong> – ${ref.title}</span>
                                    ${ref.contact ? `<span class="text-sm text-gray-500">${ref.contact}</span>` : ''}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            // Admin-only edit toggle
            window.toggleCVEdit = function() {
                const password = prompt("Enter admin password to edit CV:");
                if (password !== ADMIN_PASSWORD) {
                    alert("Incorrect password.");
                    return;
                }
                const card = document.getElementById('cv-card');
                const btn = document.getElementById('cv-edit-toggle');
                const editables = card.querySelectorAll('.editable');
                const isEditing = card.classList.toggle('cv-edit-mode');
                editables.forEach(el => {
                    el.contentEditable = isEditing;
                });
                btn.innerHTML = isEditing ? '<i class="fas fa-check"></i> Done Editing' : '<i class="fas fa-edit"></i> Edit CV';
                btn.classList.toggle('bg-purple-600', !isEditing);
                btn.classList.toggle('bg-green-600', isEditing);
            };
        }

        // ==================== RENDER: CONTACT ====================
        function renderContact() {
            container.innerHTML = `
                <div class="max-w-3xl mx-auto">
                    <h2 class="text-3xl font-bold mb-6">📧 Let's Connect</h2>
                    <div class="glass-card rounded-2xl p-8">
                        <div class="grid md:grid-cols-2 gap-8">
                            <div>
                                <h3 class="text-xl font-semibold mb-4">Contact Details</h3>
                                <div class="space-y-3">
                                    <div class="flex items-center gap-3"><i class="fas fa-envelope text-blue-500 w-6"></i><span>getayefiseha21@gmail.com</span></div>
                                    <div class="flex items-center gap-3"><i class="fas fa-phone text-blue-500 w-6"></i><span>+251-980574725</span></div>
                                    <div class="flex items-center gap-3"><i class="fas fa-map-marker-alt text-blue-500 w-6"></i><span>Addis Ababa, Ethiopia</span></div>
                                    <div class="flex items-center gap-3"><i class="fab fa-linkedin text-blue-500 w-6"></i><a href="https://www.linkedin.com/in/getaye-fiseha-tadesse/" target="_blank" class="hover:text-blue-500">LinkedIn</a></div>
                                    <div class="flex items-center gap-3"><i class="fab fa-github text-blue-500 w-6"></i><a href="https://github.com/getaye21" target="_blank" class="hover:text-blue-500">GitHub</a></div>
                                </div>
                            </div>
                            <div>
                                <h3 class="text-xl font-semibold mb-4">Send a Message</h3>
                                <form id="contact-form" class="space-y-4">
                                    <input type="text" id="form-name" placeholder="Your name" required class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none">
                                    <input type="email" id="form-email" placeholder="Your email" required class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none">
                                    <input type="text" id="form-subject" placeholder="Subject" required class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none">
                                    <textarea id="form-message" rows="3" placeholder="Your message..." required class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                                    <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition">Send Message</button>
                                </form>
                                <div id="form-status" class="mt-3 text-sm text-center"></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('contact-form')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const name = document.getElementById('form-name').value;
                const email = document.getElementById('form-email').value;
                const subject = document.getElementById('form-subject').value;
                const message = document.getElementById('form-message').value;
                const status = document.getElementById('form-status');
                const btn = document.getElementById('submit-btn');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Sending...';
                status.innerHTML = '<span class="text-blue-500">Sending...</span>';
                try {
                    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
                        from_name: name,
                        from_email: email,
                        subject: subject,
                        message: message
                    });
                    status.innerHTML = '<span class="text-green-600">✓ Message sent!</span>';
                    document.getElementById('contact-form').reset();
                    setTimeout(() => status.innerHTML = '', 5000);
                } catch (error) {
                    status.innerHTML = '<span class="text-red-500">Failed to send. Please try again.</span>';
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = 'Send Message';
                }
            });
        }

        // ==================== INIT ====================
        document.querySelector(`.sidebar-nav a[data-section="${currentSection}"]`)?.classList.add('active');

        window.addEventListener('hashchange', () => {
            const section = window.location.hash.replace('#', '') || 'home';
            if (section !== currentSection) {
                navigateTo(section);
            }
        });

        sidebarLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const section = link.dataset.section;
                navigateTo(section);
            });
        });

        fetchAllData();
    </script>
</body>
