    <script>
        // ==================== SUPABASE CONFIG ====================
        const SUPABASE_URL = "https://vedehlwosfutknqhguiv.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZlZGVobHdvc2Z1dGtucWhndWl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMjQxOTUsImV4cCI6MjA5NzcwMDE5NX0.PU4cyfwNj41flxXXcLL37YgLHIjKhzkkRg4KWmHZ0H0";

        // Initialize Supabase client (no duplicate)
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ==================== EMAILJS ====================
        const EMAILJS_PUBLIC_KEY = "kIJSIlPXMV_TU9Dv6";
        const EMAILJS_SERVICE_ID = "service_cyqyljp";
        const EMAILJS_TEMPLATE_ID = "template_sbfixck";
        emailjs.init(EMAILJS_PUBLIC_KEY);

        // ==================== STATE ====================
        let currentSection = 'home';
        let allData = { experiences: [], certifications: [], education: [], projects: [], news: [], services: [], clients: [] };

        const container = document.getElementById('content-container');
        const sidebarLinks = document.querySelectorAll('.sidebar-nav a');
        const hamburger = document.getElementById('hamburger');
        const sidebar = document.getElementById('sidebar');

        sidebarLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const section = link.dataset.section;
                navigateTo(section);
                sidebar.classList.remove('open');
            });
        });
        hamburger.addEventListener('click', () => { sidebar.classList.toggle('open'); });

        function navigateTo(section) {
            currentSection = section;
            sidebarLinks.forEach(l => l.classList.remove('active'));
            document.querySelector(`.sidebar-nav a[data-section="${section}"]`)?.classList.add('active');
            renderSection(section);
        }

        async function fetchAllData() {
            try {
                const [experiences, certifications, education, projects, news, services, clients] = await Promise.all([
                    supabaseClient.from('experiences').select('*').order('display_order', { ascending: true }),
                    supabaseClient.from('certifications').select('*').order('display_order', { ascending: true }),
                    supabaseClient.from('education').select('*').order('display_order', { ascending: true }),
                    supabaseClient.from('projects').select('*').order('display_order', { ascending: true }),
                    supabaseClient.from('news').select('*').order('date', { ascending: false }),
                    supabaseClient.from('services').select('*').order('display_order', { ascending: true }),
                    supabaseClient.from('clients').select('*').order('display_order', { ascending: true })
                ]);
                allData.experiences = experiences.data || [];
                allData.certifications = certifications.data || [];
                allData.education = education.data || [];
                allData.projects = projects.data || [];
                allData.news = news.data || [];
                allData.services = services.data || [];
                allData.clients = clients.data || [];
                renderSection(currentSection);
            } catch (error) {
                console.error('Error fetching data:', error);
                container.innerHTML = `<div class="text-center py-12 text-red-500">⚠️ Failed to load data. Please try again.</div>`;
            }
        }

        function renderSection(section) {
            switch(section) {
                case 'home': renderHome(); break;
                case 'about': renderAbout(); break;
                case 'news': renderNews(); break;
                case 'services': renderServices(); break;
                case 'clients': renderClients(); break;
                case 'experience': renderExperience(); break;
                case 'education': renderEducation(); break;
                case 'certifications': renderCertifications(); break;
                case 'projects': renderProjects(); break;
                case 'contact': renderContact(); break;
                default: renderHome();
            }
        }

        function renderHome() {
            const exp = allData.experiences;
            container.innerHTML = `
                <div class="max-w-4xl mx-auto space-y-8">
                    <div class="hero-image-container rounded-2xl shadow-xl">
                        <img src="https://images.unsplash.com/photo-1558494949-ef010cbdcc31?w=1200&h=400&fit=crop" alt="System Administration" onerror="this.style.display='none'">
                        <div class="hero-image-overlay">
                            <div class="text-center">
                                <h1 class="text-4xl md:text-5xl font-bold">Hi, I'm <span class="gradient-text">Getaye Fiseha</span></h1>
                                <p class="text-xl text-gray-300 mt-2">System & Database Officer | Full Stack Developer</p>
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="glass-card rounded-xl p-4 text-center"><div class="text-3xl font-bold text-blue-500">${exp.length}</div><div class="text-sm text-gray-500">Experiences</div></div>
                        <div class="glass-card rounded-xl p-4 text-center"><div class="text-3xl font-bold text-purple-500">${allData.projects.length}</div><div class="text-sm text-gray-500">Projects</div></div>
                        <div class="glass-card rounded-xl p-4 text-center"><div class="text-3xl font-bold text-green-500">${allData.certifications.length}</div><div class="text-sm text-gray-500">Certifications</div></div>
                        <div class="glass-card rounded-xl p-4 text-center"><div class="text-3xl font-bold text-yellow-500">${allData.clients.length}</div><div class="text-sm text-gray-500">Clients</div></div>
                    </div>
                    ${allData.news.length > 0 ? `
                        <div class="glass-card rounded-xl p-6">
                            <h2 class="text-xl font-bold mb-4"><i class="fas fa-newspaper text-blue-500"></i> Latest News</h2>
                            ${allData.news.slice(0, 3).map(n => `
                                <div class="news-card ${n.pinned ? 'pinned' : ''} py-2 ${n.pinned ? 'bg-yellow-50/50 dark:bg-yellow-900/10 rounded-lg px-3' : ''}">
                                    <div class="flex items-center gap-2">${n.pinned ? '<span class="text-yellow-500 text-xs font-bold">📌 PINNED</span>' : ''}<span class="text-xs text-gray-400">${new Date(n.date).toLocaleDateString()}</span></div>
                                    <h3 class="font-semibold">${n.title}</h3>

                </div>
            `;
        }

        function renderAbout() {
            container.innerHTML = `
                <div class="max-w-3xl mx-auto space-y-6">
                    <h2 class="text-3xl font-bold">About Me</h2>
                    <div class="glass-card rounded-xl p-6">
                        <p class="text-lg leading-relaxed">I am a passionate IT professional currently working as a System and Database Officer at Ahadu Bank, where I manage Active Directory, Oracle Database, Nutanix Prism virtualization, and mail exchange systems. With a strong foundation in Electrical and Computer Engineering from Wollo University (GPA: 3.91) and ongoing MSc in Computer Science at Addis Ababa University, I bridge the gap between infrastructure engineering and modern software development.</p>
                        <p class="text-lg leading-relaxed mt-4">My technical expertise includes Linux system administration, virtualization (Nutanix AHV), hyper-converged infrastructure, cloud databases, and full-stack development with React, Node.js, and Python.</p>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="text-center p-4 glass-card rounded-xl"><i class="fas fa-server text-3xl text-blue-500"></i><p class="font-semibold mt-2">System Admin</p></div>
                        <div class="text-center p-4 glass-card rounded-xl"><i class="fas fa-code text-3xl text-blue-500"></i><p class="font-semibold mt-2">Full Stack Dev</p></div>
                        <div class="text-center p-4 glass-card rounded-xl"><i class="fas fa-brain text-3xl text-blue-500"></i><p class="font-semibold mt-2">AI Engineer</p></div>
                        <div class="text-center p-4 glass-card rounded-xl"><i class="fas fa-building text-3xl text-blue-500"></i><p class="font-semibold mt-2">Infrastructure Eng</p></div>
                    </div>
                </div>
            `;
        }

        function renderNews() {
            if (allData.news.length === 0) { container.innerHTML = `<div class="text-center py-12 text-gray-500">No news yet. Check back soon!</div>`; return; }
            container.innerHTML = `
                <div class="max-w-3xl mx-auto">
                    <h2 class="text-3xl font-bold mb-6">📰 News & Announcements</h2>
                    ${allData.news.map(n => `

                            <h3 class="text-xl font-bold">${n.title}</h3>
                            <p class="text-gray-600 dark:text-gray-400 mt-1">${n.content}</p>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderServices() {
            if (allData.services.length === 0) { container.innerHTML = `<div class="text-center py-12 text-gray-500">No services listed yet.</div>`; return; }
            container.innerHTML = `

            `;
        }

                    <h2 class="text-3xl font-bold mb-6">🤝 My Clients</h2>
                    <div class="grid md:grid-cols-3 gap-6">

                            <div class="glass-card rounded-xl p-6 text-center">

                                <h3 class="font-bold">${c.name}</h3>
                                <p class="text-sm text-gray-500 mt-1">${c.description}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

            const grouped = allData.experiences.reduce((acc, exp) => { if (!acc[exp.company]) acc[exp.company] = []; acc[exp.company].push(exp); return acc; }, {});
            container.innerHTML = `
                <div class="max-w-4xl mx-auto">
                    <h2 class="text-3xl font-bold mb-6">💼 Work Experience</h2>
                    ${Object.entries(grouped).map(([company, exps]) => `
                        <div class="mb-8">
                            <h3 class="text-2xl font-bold text-blue-600 dark:text-blue-400">${company}</h3>

                                <div class="glass-card rounded-xl p-5 mt-3 ml-4 border-l-4 border-blue-500">

                                        <div>
                                            <h4 class="text-xl font-bold">${exp.title}</h4>

                                </div>
                                <p class="text-gray-600 dark:text-gray-400 text-sm mt-2">${p.description}</p>
                                <div class="flex flex-wrap gap-2 mt-3">${p.tech ? p.tech.map(t => `<span class="px-2 py-1 bg-gray-100 dark:bg-gray-800 rounded-md text-xs">${t}</span>`).join('') : ''}</div>
                                ${p.link ? `<a href="${p.link}" target="_blank" class="text-blue-500 text-sm hover:underline mt-3 inline-block">View Project →</a>` : ''}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderContact() {
            container.innerHTML = `
                <div class="max-w-3xl mx-auto">
                    <h2 class="text-3xl font-bold mb-6">📧 Let's Connect</h2>
                    <div class="glass-card rounded-2xl p-8">
                        <div class="grid md:grid-cols-2 gap-8">
                            <div>
                                <h3 class="text-xl font-semibold mb-4">Contact Details</h3>
                                <div class="space-y-3">
                                    <div class="flex items-center gap-3"><i class="fas fa-envelope text-blue-500 w-6"></i><span>getayefiseha21@gmail.com</span></div>
                                    <div class="flex items-center gap-3"><i class="fas fa-phone text-blue-500 w-6"></i><span>+251-980574725</span></div>
                                    <div class="flex items-center gap-3"><i class="fas fa-map-marker-alt text-blue-500 w-6"></i><span>Addis Ababa, Ethiopia</span></div>
                                    <div class="flex items-center gap-3"><i class="fab fa-linkedin text-blue-500 w-6"></i><a href="https://www.linkedin.com/in/getaye-fiseha-tadesse/" target="_blank" class="hover:text-blue-500">LinkedIn</a></div>
                                    <div class="flex items-center gap-3"><i class="fab fa-github text-blue-500 w-6"></i><a href="https://github.com/getaye21" target="_blank" class="hover:text-blue-500">GitHub</a></div>
                                </div>
                            </div>
                            <div>
                                <h3 class="text-xl font-semibold mb-4">Send a Message</h3>
                                <form id="contact-form" class="space-y-4">
                                    <input type="text" id="form-name" placeholder="Your name" required class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none">
                                    <input type="email" id="form-email" placeholder="Your email" required class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none">
                                    <input type="text" id="form-subject" placeholder="Subject" required class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none">
                                    <textarea id="form-message" rows="3" placeholder="Your message..." required class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                                    <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition">Send Message</button>
                                </form>
                                <div id="form-status" class="mt-3 text-sm text-center"></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('contact-form')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const name = document.getElementById('form-name').value;
                const email = document.getElementById('form-email').value;
                const subject = document.getElementById('form-subject').value;
                const message = document.getElementById('form-message').value;
                const status = document.getElementById('form-status');
                const btn = document.getElementById('submit-btn');
                btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Sending...';
                status.innerHTML = '<span class="text-blue-500">Sending...</span>';
                try {
                    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, { from_name: name, from_email: email, subject, message });
                    status.innerHTML = '<span class="text-green-600">✓ Message sent!</span>';
                    document.getElementById('contact-form').reset();
                    setTimeout(() => status.innerHTML = '', 5000);
                } catch (error) {
                    status.innerHTML = '<span class="text-red-500">Failed to send. Please try again.</span>';
                } finally { btn.disabled = false; btn.innerHTML = 'Send Message'; }
            });
        }

        function initTheme() {
            const saved = localStorage.getItem('theme') || 'light';
            document.body.className = saved;
            const icon = document.getElementById('theme-icon');
            if (icon) { icon.className = saved === 'dark' ? 'fas fa-moon' : 'fas fa-sun'; icon.style.color = saved === 'dark' ? '#9ca3af' : '#eab308'; }
        }
        document.getElementById('theme-toggle')?.addEventListener('click', () => {
            const isDark = document.body.classList.contains('dark');
            document.body.className = isDark ? 'light' : 'dark';
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
            const icon = document.getElementById('theme-icon');
            if (icon) { icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon'; icon.style.color = isDark ? '#eab308' : '#9ca3af'; }
        });

        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 768 && !sidebar.contains(e.target) && !hamburger.contains(e.target)) { sidebar.classList.remove('open'); }
        });

        initTheme();
        fetchAllData();
    </script>
</body>
</html>
